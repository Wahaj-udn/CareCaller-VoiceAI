        .glass-nav { backdrop-filter: blur(24px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .voice-pulse {
            position: relative;
        }
        .voice-pulse::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #006e1c;
            opacity: 0.2;
            z-index: -1;
            transform: scale(1.4);
        }

<!-- TopNavBar Shell -->
<header class="flex items-center justify-between px-8 py-4 ml-64 full-width top-0 sticky bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl shadow-sm dark:shadow-none z-40">
    <div class="flex items-center gap-6 flex-1">
        <div class="relative w-full max-w-md">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary text-sm">search</span>
            <input class="w-full pl-10 pr-4 py-2 bg-surface-container-high border-none rounded-xl text-sm focus:ring-2 focus:ring-primary/20 placeholder:text-secondary/60" placeholder="Search callers, transcripts, or logs..." type="text"/>

    <div class="flex items-center gap-4">
        <button id="nav-upload-btn" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-secondary hover:opacity-80 transition-opacity">Upload CSV</button>
        <input type="file" id="nav-upload-input" class="hidden" accept=".csv,.xlsx,.json" />
    <button id="nav-start-calling-btn" class="px-5 py-2.5 rounded-xl text-sm font-bold text-white bg-gradient-to-br from-primary to-primary-container shadow-md hover:opacity-90 transition-opacity">Start Calling</button>

<!-- Main Content Canvas -->
<main class="ml-64 p-10 min-h-screen" id="content-area">
    {% block content %}{% endblock %}
</main>
<script>
    (function initializeGlobalUpload() {
        const uploadButton = document.getElementById('nav-upload-btn');
        const fileInput = document.getElementById('nav-upload-input');
        const startCallingButton = document.getElementById('nav-start-calling-btn');
        const maxSize = 50 * 1024 * 1024;
        const validExtensions = ['.csv', '.xlsx', '.json'];

        if (!uploadButton || !fileInput || !startCallingButton) {
            return;
        }

        function notify(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'fixed bottom-10 right-10 z-50 px-6 py-4 rounded-2xl shadow-2xl text-white font-bold text-sm flex items-center gap-3';

            if (type === 'error') {
                notification.classList.add('bg-error');
                notification.innerHTML = '<span class="material-symbols-outlined">error</span>' + message;
            } else {
                notification.classList.add('bg-primary');
                notification.innerHTML = '<span class="material-symbols-outlined">check_circle</span>' + message;
            }

            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 4000);
        }

        function isValidFile(file) {
            if (!file) return false;

            if (file.size > maxSize) {
                notify('File size exceeds 50MB limit', 'error');
                return false;
            }

            const fileName = (file.name || '').toLowerCase();
            const hasValidExtension = validExtensions.some((ext) => fileName.endsWith(ext));
            if (!hasValidExtension) {
                notify('Invalid file format. Please upload .csv, .xlsx, or .json', 'error');
                return false;
            }

            return true;
        }

        async function uploadSelectedFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(payload.error || 'Server upload failed');
                }

                notify(file.name + ' uploaded successfully!', 'success');
            } catch (error) {
                notify('Upload failed: ' + error.message, 'error');
            }
        }

        uploadButton.addEventListener('click', () => fileInput.click());

        startCallingButton.addEventListener('click', async () => {
            const originalLabel = startCallingButton.textContent;
            startCallingButton.disabled = true;
            startCallingButton.classList.add('opacity-70', 'cursor-not-allowed');
            startCallingButton.textContent = 'Starting...';

            try {
                const response = await fetch('/api/start-calling', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ csv_file: 'patient_checkin.csv' })
                });

                const payload = await response.json().catch(() => ({}));
                if (!response.ok || !payload.success) {
                    throw new Error(payload.error || payload.message || 'Unable to start calling process');
                }

                notify('Calling started with patient_checkin.csv', 'success');
            } catch (error) {
                notify('Start calling failed: ' + error.message, 'error');
            } finally {
                startCallingButton.disabled = false;
                startCallingButton.classList.remove('opacity-70', 'cursor-not-allowed');
                startCallingButton.textContent = originalLabel;
            }
        });

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files && event.target.files[0];
            if (!isValidFile(file)) {
                fileInput.value = '';
                return;
            }

            await uploadSelectedFile(file);
            fileInput.value = '';
        });
    })();
</script>
{% block page_scripts %}{% endblock %}
</body>
</html>
